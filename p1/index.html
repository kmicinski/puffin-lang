<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Compiler-IR Playground</title>

    <!-- ▸ Vue 3 global build -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>

    <!-- ▸ Monaco loader (≈50 kB gzip) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>
    <script>
      require.config({
        paths: { vs: "https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs" }
      });
    </script>

    <style>
      :root {
        --border:#c8c8c8;
        --bg:#fafafa;
        --pad:8px;
        --runbar-h:38px;
        font-family: system-ui, sans-serif;
      }
      html,body,#app{height:100%;margin:0}
      #app{
        display:grid;
        grid-template-columns:1fr 1fr; /* was 1fr 1fr 1fr */
      }
      .editor-pane{border-right:1px solid var(--border);position:relative}
      .runbar{
        position:absolute;top:0;left:0;right:0;
        height:var(--runbar-h);
        display:flex;gap:8px;align-items:center;
        padding:0 var(--pad);
        background:#f3f3f3;border-bottom:1px solid var(--border);
      }
      .runbar input{flex:1 1 auto;height:26px;padding:0 6px}
      #editor{position:absolute;top:var(--runbar-h);bottom:0;left:0;right:0}
      .pass-pane{overflow-y:auto;padding:var(--pad)}
      .pass-box{
        border:1px solid var(--border);
        background:var(--bg);
        padding:var(--pad);
        margin-bottom:var(--pad);
        white-space:pre-wrap;
        font-family:monospace;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <!-- ▸ LEFT PANE: Monaco -->
      <div class="editor-pane">
        <div class="runbar">
          <input v-model="serverUrl" placeholder="http://localhost:8000/">
          <select v-model="selectedId" style="max-width: 340px">
            <option disabled value="">— choose a native test —</option>
            <option v-for="t in tests" :key="t.id" :value="t.id">
              {{ t.id }} (input stream {{ t.number }})
            </option>
          </select>
          <button @click="loadTest">Load</button>
          <button @click="evaluate">Run ▶︎</button>
        </div>
        <div id="editor"></div>
      </div>

      <!-- ▸ RIGHT PANE: student output -->
      <div class="pass-pane">
        <template v-if="passes.length">
          <div v-for="p in passes" :key="p.pass" class="pass-box">
            <strong>Pass {{p['pass-name']}}</strong><br/>
            Input:
            <div>{{p.input}}</div>
            Output:
            <div>{{p['pretty-output']}}</div>
            Satisfies input predicate:
            <div>{{p['satisfies-input-predicate']}}</div>
            Satisfies output predicate:
            <div>{{p['satisfies-output-predicate']}}</div>
            Interpretation (on an input stream...):
            <div>{{p['interp']}}</div>
            STDOUT (from running program):
            <div>{{p['stdout']}}</div>
          </div>
        </template>
        <p v-else style="color:#666">No output yet — click <span style="font-weight:bold">Run</span>.</p>
      </div>
    </div>

    <script>
      const { createApp, ref, onMounted } = Vue;

      createApp({
        setup(){
          const serverUrl  = ref("http://localhost:8000/");
          const passes     = ref([]);     // student run
          const tests      = ref([]);     // available native tests
          const selectedId = ref("");     // chosen test id

          let editor;

          async function fetchJSON(url){
            const r = await fetch(url);
            if(!r.ok) throw new Error(`${r.status} ${r.statusText}`);
            return await r.json();
          }

          async function loadTests(){
            tests.value = await fetchJSON("/tests");
          }

          async function loadTest(){
            if(!selectedId.value) return;
            const meta = tests.value.find(t => t.id === selectedId.value);
            if(meta && editor) editor.setValue(meta.programSource || "");
            // instructor pane removed: no golden-trace fetch here
          }

          function evaluate(){
            if(!serverUrl.value){ alert("Set the server URL first."); return; }
            const code = editor.getValue();
            fetch(serverUrl.value.replace(/\/$/,''), {
              method:"POST",
              headers:{ "Content-Type":"text/plain" },
              body:code
            })
              .then(r => r.json())
              .then(list => { passes.value = list; })
              .catch(e => alert("Request failed: " + e));
          }

          require(["vs/editor/editor.main"], () => {
            editor = monaco.editor.create(document.getElementById("editor"), {
              value: "; enter R1 source here: (program ...)\n",
              language: "scheme",
              theme: "vs",
              fontSize: 16,
              automaticLayout: true
            });
          });

          onMounted(loadTests);

          return { serverUrl, passes, tests, selectedId, loadTest, evaluate };
        }
      }).mount("#app");
    </script>
  </body>
</html>
